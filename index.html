<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --bg: #0a0a0a; --bg2: #141414; --bg3: #1e1e1e;
    --border: #2a2a2a; --accent: #f97316; --text: #f5f5f5;
    --text2: #a3a3a3; --text3: #525252;
    --done-bg: #0c1a0c; --done-border: #166534; --done-text: #86efac;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  /* SYNC BANNER */
  .sync-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 6px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.3s; }
  .sync-bar.syncing { background: #1a1a00; color: #fbbf24; }
  .sync-bar.synced  { background: #0c1a0c; color: var(--done-text); }
  .sync-bar.error   { background: #1a0a0a; color: #f87171; }
  .sync-bar.hidden  { display: none; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .sync-bar.syncing .sync-dot { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* LOADING */
  .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 200; }
  .loading-screen.hidden { display: none; }
  .loading-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 900; }
  .loading-logo span { color: var(--accent); }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text3); }

  header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 20px 12px; }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 12px; }
  .app-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
  .app-title span { color: var(--accent); }
  .progress-info { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; color: var(--text2); text-align: right; line-height: 1.2; }
  .progress-info strong { display: block; font-size: 22px; color: var(--accent); }
  .progress-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #fbbf24); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  .week-tabs { display: flex; gap: 6px; padding: 16px 20px 0; overflow-x: auto; scrollbar-width: none; }
  .week-tabs::-webkit-scrollbar { display: none; }
  .week-tab { flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.2s; }
  .week-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .week-tab.completed { border-color: var(--done-border); color: var(--done-text); }
  .week-tab .week-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--done-text); margin-right: 4px; vertical-align: middle; }

  .week-section { display: none; padding: 16px 20px 0; }
  .week-section.active { display: block; }
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .week-title { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900; line-height: 1; }
  .week-title span { color: var(--accent); }
  .week-stats { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--text3); text-align: right; }
  .week-stats strong { display: block; font-size: 20px; color: var(--text2); }

  .day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.3s; }
  .day-card.done { background: var(--done-bg); border-color: var(--done-border); }
  .day-card.rest { opacity: 0.55; }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .day-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); min-width: 32px; }
  .day-card.done .day-badge { color: var(--done-text); }
  .day-type-icon { font-size: 18px; flex-shrink: 0; }
  .day-info { flex: 1; min-width: 0; }
  .day-type { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .day-card.done .day-type { text-decoration: line-through; color: var(--done-text); }
  .day-desc { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-card.done .day-desc { color: var(--text3); }
  .day-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .check-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text3); font-size: 14px; }
  .check-btn:hover { border-color: var(--accent); color: var(--accent); }
  .day-card.done .check-btn { background: var(--done-border); border-color: var(--done-border); color: var(--done-text); }
  .expand-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 4px; transition: transform 0.2s, color 0.2s; }
  .expand-btn:hover { color: var(--text2); }
  .day-card.expanded .expand-btn { transform: rotate(180deg); }
  .day-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .day-card.expanded .day-body { display: block; }
  .day-card.done .day-body { border-top-color: var(--done-border); }
  .day-full-desc { font-size: 14px; color: var(--text2); line-height: 1.6; padding-top: 14px; padding-bottom: 14px; }
  .day-full-desc .highlight { color: var(--accent); font-weight: 600; }

  .photos-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .photo-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; position: relative; background: var(--bg3); cursor: pointer; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-delete { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.75); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .photo-thumb:hover .photo-delete, .photo-thumb:active .photo-delete { opacity: 1; }
  .add-photo-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; border: 1.5px dashed var(--border); border-radius: 8px; background: transparent; color: var(--text3); font-family: 'Barlow', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .add-photo-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-photo-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .photo-limit { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .file-input { display: none; }
  .notes-area { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 10px 12px; resize: none; margin-top: 10px; min-height: 60px; transition: border-color 0.2s; }
  .notes-area:focus { outline: none; border-color: var(--accent); }
  .notes-area::placeholder { color: var(--text3); }

  .week-progress-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .week-progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .week-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .week-progress-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text3); white-space: nowrap; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; padding: 10px 20px; border-radius: 24px; transition: transform 0.3s cubic-bezier(.4,0,.2,1); z-index: 500; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .no-photos { font-size: 12px; color: var(--text3); margin-bottom: 10px; }

  @media (max-width: 380px) {
    .app-title { font-size: 24px; }
    .week-title { font-size: 28px; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

const TOTAL_SESSIONS = PLAN.reduce((a,w) => a + w.days.filter(d=>!d.rest).length, 0);

// ─── State (in-memory, synced with Firestore) ─────────────────────
let state = {}; // { 'w1d1': { done, notes, photos:[] }, ... }
let activeWeek = 1;
let saveTimers = {};

function cardId(w,d) { return 'w'+w+'d'+d; }
function getSession(w,d) { return state[cardId(w,d)] || { done:false, notes:'', photos:[] }; }

// ─── Image compression ────────────────────────────────────────────
function compressImage(file, maxW=600, quality=0.65) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ─── Firestore operations ─────────────────────────────────────────
async function loadAllFromFirestore() {
  try {
    const snap = await db.collection(COLLECTION).get();
    snap.forEach(doc => {
      state[doc.id] = doc.data();
      if (!state[doc.id].photos) state[doc.id].photos = [];
    });
  } catch(e) {
    console.error('Load error:', e);
    // fallback to localStorage
    try {
      const ls = localStorage.getItem('plan6k_state');
      if (ls) {
        const parsed = JSON.parse(ls);
        // migrate old format
        if (parsed.done) {
          Object.keys(parsed.done).forEach(id => {
            if (!state[id]) state[id] = { done:false, notes:'', photos:[] };
            state[id].done = !!parsed.done[id];
            state[id].notes = (parsed.notes && parsed.notes[id]) || '';
            state[id].photos = (parsed.photos && parsed.photos[id]) || [];
          });
        }
      }
    } catch(e2){}
  }
}

function saveSession(w, d) {
  const id = cardId(w,d);
  const data = state[id] || { done:false, notes:'', photos:[] };
  setSyncBar('syncing', 'Guardando...');
  db.collection(COLLECTION).doc(id).set(data)
    .then(() => setSyncBar('synced', 'Guardado ✓'))
    .catch(err => {
      console.error('Save error:', err);
      setSyncBar('error', 'Error al guardar');
    });
}

function saveSessionDebounced(w, d, delay=1200) {
  const id = cardId(w,d);
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => saveSession(w,d), delay);
}

// ─── Sync bar ─────────────────────────────────────────────────────
let syncHideTimer;
function setSyncBar(state, msg) {
  const bar = document.getElementById('sync-bar');
  const msgEl = document.getElementById('sync-msg');
  bar.className = 'sync-bar ' + state;
  msgEl.textContent = msg;
  clearTimeout(syncHideTimer);
  if (state === 'synced') syncHideTimer = setTimeout(() => bar.classList.add('hidden'), 2000);
}

// ─── Mutations ────────────────────────────────────────────────────
function toggleDone(w, d) {
  const id = cardId(w,d);
  if (!state[id]) state[id] = { done:false, notes:'', photos:[] };
  state[id].done = !state[id].done;
  saveSession(w, d);
  renderAll();
  showToast(state[id].done ? '✓ ¡Entrenamiento completado!' : 'Marcado como pendiente');
}

async function addPhoto(w, d, file) {
  const id = cardId(w,d);
  if (!state[id]) state[id] = { done:false, notes:'', photos:[] };
  if (state[id].photos.length >= MAX_PHOTOS) { showToast('Máx. '+MAX_PHOTOS+' fotos por sesión'); return; }
  setSyncBar('syncing', 'Subiendo foto...');
  try {
    const compressed = await compressImage(file);
    state[id].photos.push(compressed);
    saveSession(w, d);
    renderWeek(activeWeek);
  } catch(e) {
    setSyncBar('error', 'Error al procesar la foto');
  }
}

function deletePhoto(w, d, idx) {
  const id = cardId(w,d);
  state[id].photos.splice(idx, 1);
  saveSession(w, d);
  renderWeek(activeWeek);
}

function updateNotes(w, d, val) {
  const id = cardId(w,d);
  if (!state[id]) state[id] = { done:false, notes:'', photos:[] };
  state[id].notes = val;
  saveSessionDebounced(w, d);
}

// ─── Render ───────────────────────────────────────────────────────
function countDone() { return Object.values(state).filter(s=>s.done).length; }
function weekDoneCount(wIdx) { return PLAN[wIdx].days.filter(d=>!d.rest && (state[cardId(wIdx+1,d.day)]||{}).done).length; }
function weekTotal(wIdx) { return PLAN[wIdx].days.filter(d=>!d.rest).length; }
function isWeekComplete(wIdx) { return weekDoneCount(wIdx)===weekTotal(wIdx); }

function updateGlobal() {
  const done = countDone();
  const pct = Math.round((done/TOTAL_SESSIONS)*100);
  document.getElementById('global-bar').style.width = pct+'%';
  document.getElementById('global-pct').textContent = pct+'%';
  document.getElementById('global-count').textContent = done+' / '+TOTAL_SESSIONS+' sesiones';
}

function setActiveWeek(w) {
  activeWeek = w;
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.week)===w));
  document.querySelectorAll('.week-section').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.week)===w));
}

function buildTabs() {
  const cont = document.getElementById('week-tabs');
  cont.innerHTML = '';
  PLAN.forEach((_,i) => {
    const btn = document.createElement('button');
    btn.className = 'week-tab'+(i===0?' active':'');
    btn.dataset.week = i+1;
    btn.onclick = () => setActiveWeek(i+1);
    btn.textContent = 'S'+(i+1);
    cont.appendChild(btn);
  });
}

function buildWeekSections() {
  const cont = document.getElementById('weeks-container');
  cont.innerHTML = '';
  PLAN.forEach((_,i) => {
    const s = document.createElement('div');
    s.className = 'week-section'+(i===0?' active':'');
    s.dataset.week = i+1;
    cont.appendChild(s);
  });
}

function renderWeek(wNum) {
  const wIdx = wNum-1;
  const week = PLAN[wIdx];
  const section = document.querySelector('.week-section[data-week="'+wNum+'"]');
  if (!section) return;
  const done = weekDoneCount(wIdx);
  const total = weekTotal(wIdx);
  const pct = total>0?Math.round((done/total)*100):0;

  section.innerHTML =
    '<div class="week-header">'+
      '<div class="week-title">SEMANA <span>'+wNum+'</span></div>'+
      '<div class="week-stats"><strong>'+done+'/'+total+'</strong>sesiones</div>'+
    '</div>'+
    '<div class="week-progress-wrap">'+
      '<div class="week-progress-track"><div class="week-progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="week-progress-label">'+pct+'%</div>'+
    '</div>'+
    week.days.map(d => buildDayCard(wNum, d)).join('');

  section.querySelectorAll('.check-btn').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); toggleDone(parseInt(btn.dataset.w), parseInt(btn.dataset.d)); };
  });
  section.querySelectorAll('.day-header').forEach(hdr => {
    hdr.onclick = () => hdr.closest('.day-card').classList.toggle('expanded');
  });
  section.querySelectorAll('.file-input').forEach(input => {
    input.onchange = e => {
      const w=parseInt(input.dataset.w), d=parseInt(input.dataset.d);
      Array.from(e.target.files).forEach(file => addPhoto(w, d, file));
      input.value='';
    };
  });
  section.querySelectorAll('.photo-delete').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); deletePhoto(parseInt(btn.dataset.w), parseInt(btn.dataset.d), parseInt(btn.dataset.idx)); };
  });
  section.querySelectorAll('.photo-thumb img').forEach(img => {
    img.onclick = () => openLightbox(img.src);
  });
  section.querySelectorAll('.notes-area').forEach(ta => {
    ta.oninput = () => updateNotes(parseInt(ta.dataset.w), parseInt(ta.dataset.d), ta.value);
  });

  const tab = document.querySelector('.week-tab[data-week="'+wNum+'"]');
  if (tab) {
    const complete = isWeekComplete(wIdx);
    tab.classList.toggle('completed', complete);
    tab.innerHTML = complete ? '<span class="week-dot"></span>S'+wNum : 'S'+wNum;
    if (activeWeek===wNum) tab.classList.add('active');
  }
}

function buildDayCard(wNum, d) {
  const sess = getSession(wNum, d.day);
  const done = sess.done;
  const photos = sess.photos || [];
  const notes = sess.notes || '';
  const atLimit = photos.length >= MAX_PHOTOS;
  const classes = ['day-card', done?'done':'', d.rest?'rest':''].filter(Boolean).join(' ');

  const photosHtml = d.rest ? '' :
    '<div>'+
    '<div class="photos-label">📸 Fotos'+(photos.length>0?' ('+photos.length+'/'+MAX_PHOTOS+')':'')+'</div>'+
    (photos.length>0 ?
      '<div class="photo-grid">'+photos.map((src,idx)=>
        '<div class="photo-thumb">'+
        '<img src="'+src+'" alt="foto">'+
        '<button class="photo-delete" data-w="'+wNum+'" data-d="'+d.day+'" data-idx="'+idx+'">&#x2715;</button>'+
        '</div>'
      ).join('')+'</div>'
    : '<div class="no-photos">Sin fotos aún</div>')+
    (atLimit ? '<div class="photo-limit">Límite de '+MAX_PHOTOS+' fotos alcanzado</div>' :
      '<label>'+
      '<button class="add-photo-btn"'+(atLimit?' disabled':'')+' onclick="this.closest(\'label\').querySelector(\'input\').click();return false;">+ Añadir foto</button>'+
      '<input type="file" class="file-input" accept="image/*" multiple data-w="'+wNum+'" data-d="'+d.day+'">'+
      '</label>'
    )+
    '<textarea class="notes-area" data-w="'+wNum+'" data-d="'+d.day+'" placeholder="Notas: tiempo, sensaciones, ritmo…">'+notes+'</textarea>'+
    '</div>';

  return '<div class="'+classes+'">'+
    '<div class="day-header">'+
      '<span class="day-badge">D'+d.day+'</span>'+
      '<span class="day-type-icon">'+d.icon+'</span>'+
      '<div class="day-info">'+
        '<div class="day-type">'+d.type+'</div>'+
        '<div class="day-desc">'+d.desc+'</div>'+
      '</div>'+
      '<div class="day-actions">'+
        (!d.rest?'<button class="check-btn" data-w="'+wNum+'" data-d="'+d.day+'">'+(done?'✓':'')+'</button>':'')+
        '<button class="expand-btn">&#9662;</button>'+
      '</div>'+
    '</div>'+
    '<div class="day-body">'+
      '<div class="day-full-desc">'+d.detail+'</div>'+
      photosHtml+
    '</div>'+
  '</div>';
}

function renderAll() {
  for(let i=1;i<=8;i++) renderWeek(i);
  updateGlobal();
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').onclick = e => { if(e.target===e.currentTarget) closeLightbox(); };

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ─── Init ─────────────────────────────────────────────────────────
async function init() {
  buildTabs();
  buildWeekSections();
  await loadAllFromFirestore();
  renderAll();
  document.getElementById('loading-screen').classList.add('hidden');
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
